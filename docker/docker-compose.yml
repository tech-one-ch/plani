# Production docker-compose — Coolify / Dokploy / any Docker host.
# Uses the pre-built image from GHCR. Migrations run automatically at startup.
#
# Usage: docker compose up -d
# Copy .env.example to .env and fill in the required values.

name: plani

services:
  web:
    image: ghcr.io/tech-one-ch/plani:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      APP_URL: ${APP_URL}
      DATABASE_URL: ${DATABASE_URL}
      AUTH_SECRET: ${AUTH_SECRET}
      # Optional
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-"Plani <no-reply@plani.app>"}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      REQUIRE_EMAIL_VERIFICATION: ${REQUIRE_EMAIL_VERIFICATION:-false}
      ALLOW_SIGNUP: ${ALLOW_SIGNUP:-true}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-plani}
      POSTGRES_USER: ${POSTGRES_USER:-plani}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-plani}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
