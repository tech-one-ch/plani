version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      dev-tooling:
        patterns:
          - "turbo"
          - "typescript"
          - "eslint*"
          - "@typescript-eslint*"
          - "prettier*"
          - "lefthook"
          - "@commitlint*"
          - "vitest*"
          - "playwright*"
          - "@playwright*"
      next:
        patterns:
          - "next"
          - "react"
          - "react-dom"
          - "@types/react*"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
